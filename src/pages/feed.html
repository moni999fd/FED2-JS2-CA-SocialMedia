<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed | Social Media App</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
      /* Local layout helper just for the search row */
      #searchForm {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: nowrap;
        margin-top: 0.5rem;
      }
      #searchForm input[type="search"] {
        flex: 1 1 320px;
        min-width: 12rem;
        max-width: 36rem;
      }
      #searchForm button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 2.4rem;
        padding: 0 0.8rem;
        line-height: 1;
        white-space: nowrap;
      }
      #clearSearch {
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: #fff;
        border-radius: var(--border-radius, 0.3rem);
        cursor: pointer;
      }
      #clearSearch:hover {
        filter: brightness(0.95);
      }
      #searchStatusLine {
        margin-top: 0.5rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav class="navbar" aria-label="Main">
      <a href="feed.html" class="nav-logo">
        <img
          src="../assets/butterfly_logo.png"
          alt="SocialApp logo"
          class="logo-img"
        />
      </a>
      <ul class="nav-links">
        <li><a href="feed.html" aria-current="page">Feed</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="create.html">Create</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>

    <main>
      <h1>Feed</h1>

      <!-- Search -->
      <form id="searchForm" aria-label="Search posts">
        <input
          type="search"
          name="q"
          id="q"
          placeholder="Type here…"
          aria-label="Search"
        />
        <button type="submit">Search</button>
        <button
          type="button"
          id="clearSearch"
          aria-label="Clear search"
          title="Clear"
        >
          ×
        </button>
      </form>
      <p id="searchStatusLine" class="muted" aria-live="polite"></p>

      <!-- Posts list -->
      <section id="postList" aria-live="polite" style="margin-top: 1rem;">
        <!-- Filled by feed.js -->
      </section>
    </main>

    <!-- IMPORTANT: keep type="module" + correct path -->
    <script type="module" src="../js/feed.js"></script>
  </body>
</html>
