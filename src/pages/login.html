<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Social Media App</title>
    
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="navbar" aria-label="Main navigation">
      <a href="feed.html" class="nav-logo">
        <img
          src="../assets/butterfly_logo.png"
          alt="SocialApp logo"
          class="logo-img"
        />
      </a>
      <ul class="nav-links">
        <li><a href="feed.html">Feed</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="create.html">Create</a></li>
        <li><a href="login.html" aria-current="page">Login</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>

    <main>
      <section class="card" style="max-width: 420px; margin-inline: auto;">
        <h1>Login</h1>
        <p class="muted" style="margin-bottom: 1rem;">
          Use your <strong>@stud.noroff.no</strong> email to log in.
        </p>

        <form id="loginForm" novalidate>
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autocomplete="email"
            placeholder="yourname@stud.noroff.no"
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            minlength="8"
            autocomplete="current-password"
            placeholder="Minimum 8 characters"
          />

          <button type="submit">Login</button>

          <p
            id="loginError"
            class="error"
            aria-live="polite"
            style="margin-top: 0.5rem;"
          ></p>
        </form>

        <p class="muted" style="margin-top: 1rem;">
          Don’t have an account?
          <a href="register.html" class="author-link">Register here</a>.
        </p>
      </section>
    </main>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
