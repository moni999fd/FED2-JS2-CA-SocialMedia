<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Social Media App</title>
  <link rel="stylesheet" href="../styles/style.css" />
</head>
<body>
  <nav class="navbar" aria-label="Main">
    <a href="feed.html" class="nav-logo">
      <img src="../assets/butterfly_logo.png" alt="SocialApp logo" class="logo-img">
    </a>
    <ul class="nav-links">
      <li><a href="feed.html">Feed</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="login.html" aria-current="page">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>

  <main>
    <h1>Login</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>

      <p id="loginError" class="error" aria-live="polite"></p>
      <p id="loginSuccess" class="success" aria-live="polite" style="display:none;"></p>

      <p style="margin-top:.5rem;">
        New here? <a href="register.html">Create an account</a>
      </p>
    </form>

  </main>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
